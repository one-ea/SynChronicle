name: Container CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Compose
        run: docker compose config
      - name: Build production image
        run: docker build --tag synchronicle-web:test .
